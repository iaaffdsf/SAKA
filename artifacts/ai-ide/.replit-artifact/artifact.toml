kind = "web"
previewPath = "/"
title = "AI IDE"
version = "1.0.0"
id = "artifacts/ai-ide"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23107

[services.development]
run = "pnpm --filter @workspace/frontend run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/frontend", "run", "build" ]
serve = "static"
publicDir = "frontend/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23107"
BASE_PATH = "/"
